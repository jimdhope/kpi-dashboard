services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kpi_quest_v3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_v3_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    ports:
      - "9103:9103"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kpi_quest_v3
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_v3_data:
