services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kpi_quest_v3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_v3_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

app:
    image: ghcr.io/jimdhope/kpi-dashboard/app:latest
    restart: unless-stopped
    ports:
      - "9103:9103"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kpi_quest_v3
      - NODE_ENV=production
      - PORT=9103
      - DB_HOST=postgres
      - SESSION_COOKIE_SECRET=dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_v3_data:
