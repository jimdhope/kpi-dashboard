services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kpi_quest_v3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_v3_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    command: postgres -c password_encryption=scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      kpi_quest_net:
        ipv4_address: 172.23.0.2

  app:
    image: jimdhope/kpi-dashboard:latest
    restart: unless-stopped
    ports:
      - "9103:9103"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/kpi_quest_v3
      - NODE_ENV=production
      - PORT=9103
      - DB_HOST=postgres
      - SESSION_COOKIE_SECRET=${SESSION_COOKIE_SECRET:?SESSION_COOKIE_SECRET is required}
      - RUN_SEED_ON_STARTUP=${RUN_SEED_ON_STARTUP:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      kpi_quest_net:
        ipv4_address: 172.23.0.3

  worker:
    image: jimdhope/kpi-dashboard:latest
    restart: unless-stopped
    command: ["/bin/bash", "-c", "/worker-entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/kpi_quest_v3
      - NODE_ENV=production
      - DB_HOST=postgres
      - SESSION_COOKIE_SECRET=${SESSION_COOKIE_SECRET:?SESSION_COOKIE_SECRET is required}
      - IS_WORKER=true
      - SKIP_MIGRATIONS=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      kpi_quest_net:
        ipv4_address: 172.23.0.4

volumes:
  postgres_v3_data:

networks:
  kpi_quest_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
