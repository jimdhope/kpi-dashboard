<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#071316" />
    <title>KPI Quest — Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #f5fbfa; background: linear-gradient(135deg, #071316 0%, #10272b 50%, #071316 100%); }
      main { width: min(100%, 520px); padding: 40px; text-align: center; border: 1px solid rgba(94, 234, 212, .22); border-radius: 24px; background: linear-gradient(145deg, rgba(18, 45, 49, .88), rgba(8, 25, 29, .82)); box-shadow: 0 24px 80px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255, 255, 255, .08); backdrop-filter: blur(18px); }
      img { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 12px 35px rgba(45, 212, 191, .16); }
      h1 { margin: 24px 0 12px; font-size: clamp(1.75rem, 6vw, 2.35rem); }
      p { margin: 0 auto 24px; max-width: 40ch; color: #bfd1cf; line-height: 1.65; }
      button { appearance: none; border: 1px solid rgba(94, 234, 212, .48); border-radius: 12px; padding: 12px 22px; color: #041312; background: #5eead4; font: inherit; font-weight: 700; cursor: pointer; }
      button:hover { background: #99f6e4; }
      #status { min-height: 1.5em; margin-top: 18px; margin-bottom: 0; font-size: .9rem; }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon-192.png" alt="KPI Quest" width="96" height="96" />
      <h1>You’re offline</h1>
      <p>KPI Quest needs a connection to load live dashboards and securely update your data. Nothing has been submitted while you are offline.</p>
      <button type="button" id="retry">Try again</button>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script>
      const status = document.getElementById('status');
      const retry = document.getElementById('retry');
      const tryAgain = () => {
        if (navigator.onLine) window.location.reload();
        else status.textContent = 'You are still offline. Check your connection and try again.';
      };
      retry.addEventListener('click', tryAgain);
      window.addEventListener('online', () => { status.textContent = 'Connection restored. You can try again now.'; });
    </script>
  </body>
</html>
