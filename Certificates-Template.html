<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "accent-gold": "#d4af37",
                        //    "background-light": "#f6f6f8",
                        //    "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .certificate-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .gold-gradient-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border {
            border: 2px solid transparent;
            background: linear-gradient(theme('colors.background-dark'), theme('colors.background-dark')) padding-box,
                linear-gradient(to right, #bf953f, #fcf6ba, #aa771c) border-box;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
    <div class="w-full max-w-6xl flex flex-col grow">
        <main class="flex-1 flex items-center justify-center p-4">
            <div
                class="relative w-full aspect-[1.414/1] bg-white dark:bg-slate-900 gold-border shadow-2xl rounded-sm overflow-hidden flex flex-col items-center justify-between py-16 px-20 certificate-pattern">
                <div class="absolute top-0 left-0 w-32 h-32 opacity-20 pointer-events-none">
                    <div class="w-full h-full border-t-[40px] border-l-[40px] border-accent-gold rounded-tl-sm"></div>
                </div>
                <div class="absolute bottom-0 right-0 w-32 h-32 opacity-20 pointer-events-none">
                    <div class="w-full h-full border-b-[40px] border-r-[40px] border-accent-gold rounded-br-sm"></div>
                </div>
                <div class="text-center space-y-2">
                    <div class="flex justify-center mb-6">
                        <span class="material-symbols-outlined text-accent-gold text-6xl">military_tech</span>
                    </div>
                    <h1 class="gold-gradient-text text-5xl md:text-6xl font-extrabold uppercase tracking-widest mb-4">
                        [Team Name]<br>KPI Competition</h1>
                    <div class="h-1 w-24 bg-accent-gold/40 mx-auto rounded-full"></div>
                </div>
                <div class="text-center space-y-8 w-full">
                    <p class="text-slate-500 dark:text-slate-400 text-xl font-light italic">This is to officially
                        recognize</p>
                    <div class="relative group">
                        <h2 class="text-slate-900 dark:text-slate-100 text-6xl font-black tracking-tight py-4">
                            [Agent/Team Name]</h2>
                        <div
                            class="absolute bottom-0 left-1/2 -translate-x-1/2 w-3/4 h-px bg-slate-200 dark:bg-slate-700">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <p class="text-slate-500 dark:text-slate-400 text-lg uppercase tracking-[0.2em]">for coming
                            [Position] Place during</p>
                        <p class="text-primary dark:text-blue-400 text-3xl font-bold italic tracking-tight">[Competition
                            Name] Week</p>
                    </div>
                </div>
                <div class="w-full flex justify-between items-end mt-12">
                    <div class="flex flex-col items-center space-y-2">
                        <p
                            class="text-slate-900 dark:text-slate-100 font-script italic border-b border-slate-300 dark:border-slate-700 w-48 text-center pb-2">
                            [Date]</p>
                        <p class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest font-bold">Date
                        </p>
                    </div>
                    <div class="flex flex-col items-center space-y-2">
                        <div class="flex flex-col items-center">
                            <span
                                class="text-3xl font-script italic text-slate-800 dark:text-slate-200 opacity-80 mb-[-10px]">[Manager
                                Name]</span>
                            <div class="border-b border-slate-300 dark:border-slate-700 w-48 text-center pb-2"></div>
                        </div>
                        <p class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest font-bold">
                            Team Manager</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
